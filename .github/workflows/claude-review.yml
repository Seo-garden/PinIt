name: Claude Code Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read

jobs:
  code-review:
    # PR 코멘트에서만 실행되며, 'codereview' 키워드가 포함된 경우에만 트리거
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, 'codereview')
    runs-on: ubuntu-latest

    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_sha', pr.data.base.sha);
            core.setOutput('title', pr.data.title);
            core.setOutput('body', pr.data.body || '');
            core.setOutput('branch', pr.data.head.ref);
            return pr.data;

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - name: Get changed Swift files
        id: diff
        run: |
          git fetch origin ${{ steps.pr.outputs.base_sha }} --depth=1

          # 변경된 Swift 파일 목록 추출
          CHANGED_FILES=$(git diff --name-only ${{ steps.pr.outputs.base_sha }} ${{ steps.pr.outputs.head_sha }} -- '*.swift' | head -30)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # diff 내용 추출 (최대 8000자 제한)
          DIFF_CONTENT=$(git diff ${{ steps.pr.outputs.base_sha }} ${{ steps.pr.outputs.head_sha }} -- '*.swift' | head -c 8000)
          echo "diff_content<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Run AI Code Review
        id: review
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHANGED_FILES: ${{ steps.diff.outputs.changed_files }}
          DIFF_CONTENT: ${{ steps.diff.outputs.diff_content }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          PR_BRANCH: ${{ steps.pr.outputs.branch }}
        with:
          script: |
            const changedFiles = process.env.CHANGED_FILES || '(없음)';
            const diffContent = process.env.DIFF_CONTENT || '(변경 없음)';
            const prTitle = process.env.PR_TITLE || '';
            const prBody = process.env.PR_BODY || '';
            const prBranch = process.env.PR_BRANCH || '';

            const systemPrompt = `당신은 iOS 전문 코드 리뷰어입니다.
            아래 프로젝트 스택과 아키텍처 원칙에 따라 엄격하고 건설적인 코드 리뷰를 제공합니다.

            ## 프로젝트 스택
            - 언어: Swift
            - UI: UIKit (Storyboard 없이 코드베이스로 구현)
            - 반응형: RxSwift / RxCocoa
            - 아키텍처: Clean Architecture + MVVM-C (Coordinator 패턴)
            - 백엔드: Firebase (Firestore, Auth, Storage)
            - 빌드 시스템: Tuist (모듈화된 프로젝트 구조)
            - 의존성 관리: SPM 또는 CocoaPods

            ## Clean Architecture 레이어 원칙
            - **Domain Layer**: Entity, UseCase, Repository Protocol 포함. 외부 프레임워크(RxSwift 포함) 의존 금지
            - **Data Layer**: Repository 구현체, DTO, DataSource 포함. Domain에서 정의한 Protocol을 구현
            - **Presentation Layer**: ViewModel, ViewController, Coordinator 포함. UseCase를 통해서만 Domain에 접근

            ## 리뷰 기준 (우선순위 순)
            1. **아키텍처 위반**: 레이어 간 역방향 의존, Domain의 외부 프레임워크 직접 의존, 책임 혼재
            2. **RxSwift 패턴**: DisposeBag 관리, 메모리 릭(특히 클로저 내 self 캡처), Subject 과다 사용, Input/Output 패턴 준수
            3. **Clean Architecture 경계**: UseCase 단일 책임, Repository 추상화, DTO ↔ Entity 매핑 위치
            4. **Firebase 사용**: 비즈니스 로직이 DataSource 밖으로 노출되지 않는지
            5. **Swift 코드 품질**: 옵셔널 처리, 타입 안전성, 접근 제어자, 네이밍 컨벤션
            6. **Tuist 모듈 구조**: 모듈 간 의존성 방향, 불필요한 public 노출
            7. **성능**: 불필요한 메인 스레드 전환, 과도한 스트림 생성

            ## 응답 형식
            반드시 아래 Markdown 형식으로 작성하세요. 한국어로 작성합니다.

            ### 📋 리뷰 요약
            (변경 사항을 1~2문장으로 요약)

            ### 🚨 Critical (반드시 수정)
            (아키텍처 위반, 메모리 릭, 크래시 위험 등 - 없으면 "없음")

            ### ⚠️ Major (강력 권장)
            (RxSwift 패턴 오용, 레이어 책임 혼재 등 - 없으면 "없음")

            ### 💡 Minor (개선 제안)
            (네이밍, 가독성, 스타일 등 - 없으면 "없음")

            ### ✅ 잘된 점
            (긍정적인 피드백)

            각 지적 사항은 아래 형식으로 작성합니다:
            - **파일명:줄번호** - 문제 설명 및 개선 방법 (코드 예시 포함 권장)`;

            const userMessage = `## PR 정보
            - 제목: ${prTitle}
            - 브랜치: ${prBranch}
            - 설명: ${prBody}

            ## 변경된 Swift 파일
            ${changedFiles}

            ## 코드 diff
            \`\`\`diff
            ${diffContent}
            \`\`\`

            위 변경 사항을 프로젝트 스택과 아키텍처 원칙에 맞게 리뷰해주세요.`;

            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-5',
                max_tokens: 4096,
                system: systemPrompt,
                messages: [
                  { role: 'user', content: userMessage }
                ]
              })
            });

            if (!response.ok) {
              const error = await response.text();
              throw new Error(`Anthropic API error: ${response.status} - ${error}`);
            }

            const data = await response.json();
            const reviewContent = data.content[0].text;

            core.setOutput('review', reviewContent);
            return reviewContent;

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          REVIEW_CONTENT: ${{ steps.review.outputs.review }}
        with:
          script: |
            const review = process.env.REVIEW_CONTENT;
            const requester = context.payload.comment.user.login;

            const body = `## 🤖 AI 코드 리뷰 결과

            > @${requester} 님의 요청으로 코드 리뷰를 시작했습니다.

            ${review}

            ---
            <sub>⚡ Powered by Claude AI · 리뷰 기준: Clean Architecture + RxSwift + MVVM-C</sub>`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Update reaction
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // 완료 반응 추가
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: '${{ job.status }}' === 'success' ? 'rocket' : 'confused'
            });